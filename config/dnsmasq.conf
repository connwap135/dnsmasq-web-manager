# Dnsmasq Configuration for Web Manager
# 由 dnsmasq-web-manager 项目生成

# 全局配置
user=root

# 监听地址（按需修改）
listen-address=127.0.0.1,192.168.3.32
bind-interfaces

# DNS 端口
port=53

# 上游 DNS（公共 DNS + 网关）
# 网关 192.168.0.1 通过 DHCP 租约自动知道局域网所有主机名，
# 这样就不需要手动把每台机器都加到 hosts 文件里
server=192.168.0.1
server=223.5.5.5
server=8.8.8.8

# 不读取 /etc/resolv.conf（由 Web 管理控制）
no-resolv

# 域名
domain=local

# 本地映射文件
addn-hosts=/etc/dnsmasq.hosts
hostsdir=/etc/dnsmasq.d

# 日志
log-queries
log-facility=/var/log/dnsmasq.log

# 缓存大小与行为
cache-size=1000

# 禁用负缓存：刚添加的映射应立即生效，
# 不再因之前的 NXDOMAIN 缓存而间歇失效
neg-ttl=0

# reload 时清除旧缓存，确保新映射不被过期记录干扰
clear-on-reload

# 不转发反向解析和 .local 域名（mDNS 保留域）
local=/local/
