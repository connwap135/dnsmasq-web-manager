# Dnsmasq Configuration for Web Manager
# 由 dnsmasq-web-manager 项目生成

# 全局配置
user=root
root=/etc/dnsmasq.d

# 监听地址（按需修改）
listen-address=127.0.0.1,192.168.3.32
bind-interfaces

# DNS 端口
port=53

# 上游 DNS（公共 DNS）
server=223.5.5.5
server=8.8.8.8

# 不读取 /etc/resolv.conf（由 Web 管理控制）
no-resolv

# 域名
domain=local

# 本地映射文件
addn-hosts=/etc/dnsmasq.hosts
hostsdir=/etc/dnsmasq.d

# 日志
log-queries
log-facility=/var/log/dnsmasq.log

# 缓存大小
cache-size=1000

# 不转发反向解析
local=/local/
